name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: Run type check
        run: npx tsc --noEmit

      - name: Build Next.js application
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-secret-key
          NEXTAUTH_URL: http://localhost:3000
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate build report
        if: always()
        run: |
          echo "## Build Report" > build-report.md
          echo "Build Status: ${{ job.status }}" >> build-report.md
          echo "Node Version: ${{ matrix.node-version }}" >> build-report.md
          echo "Timestamp: $(date)" >> build-report.md

      - name: Upload build artifacts
        if: always() && hashFiles('.next') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node${{ matrix.node-version }}
          path: .next
          if-no-files-found: warn
          retention-days: 7

      - name: Comment PR with build status
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            
            const comment = `## Build Status ${emoji}
            
            - Status: ${status}
            - Node Version: ${{ matrix.node-version }}
            - Build Time: ${new Date().toISOString()}`;
            
            try {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not post comment:', error.message);
            }