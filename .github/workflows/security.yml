name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: npm audit --json > audit-report.json
        continue-on-error: true

      - name: Generate SBOM (Software Bill of Materials)
        run: npm ls --all --json > sbom.json
        continue-on-error: true

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

      - name: Run Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            audit-report.json
            sbom.json
            trivy-results.sarif
          if-no-files-found: ignore

      - name: Comment PR with security results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const audit = JSON.parse(fs.readFileSync('./audit-report.json', 'utf8'));
              const vulnerabilities = audit.metadata?.vulnerabilities || {};
              
              const comment = `## Security Scan Results 🔒
              
              | Severity | Count |
              |----------|-------|
              | Critical | ${vulnerabilities.critical || 0} |
              | High | ${vulnerabilities.high || 0} |
              | Moderate | ${vulnerabilities.moderate || 0} |
              | Low | ${vulnerabilities.low || 0} |
              
              ${vulnerabilities.critical > 0 ? '⚠️ **Critical vulnerabilities found!**' : '✅ No critical vulnerabilities'}
              
              [View full audit report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.log('Could not parse audit results');
            }
