name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 1 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues
        uses: actions/stale@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            👋 This issue has been automatically marked as stale because it has not had activity for 30 days.
            
            If this is still relevant, please:
            - Add a comment to keep it active
            - Update the issue with new information
            - Assign it to someone
            
            Otherwise, it will be closed in 7 days.
          stale-pr-message: |
            👋 This PR has been automatically marked as stale because it has not had activity for 14 days.
            
            If you're still working on this:
            - Add a comment to keep it active
            - Push new commits to restart the timer
            - Request a review
            
            Otherwise, it will be closed in 7 days.
          close-issue-message: 'Closing due to inactivity. Feel free to reopen if you plan to continue.'
          close-pr-message: 'Closing due to inactivity. Feel free to reopen if you plan to continue.'
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-issue-stale: 30
          days-before-pr-stale: 14
          days-before-issue-close: 7
          days-before-pr-close: 7
          exempt-issue-labels: 'pinned,security'
          exempt-pr-labels: 'pinned,in-progress'
